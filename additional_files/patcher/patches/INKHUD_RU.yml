# Patch for InkHUD Russian language support
# Replaces WIN1252 encoding with WIN1251 for Russian character support

description: "Replace WIN1252 fonts with WIN1251 for Russian language support in InkHUD"

patches:
  - type: replace
    description: "Replace large font encoding"
    search: "FREESANS_12PT_WIN1252"
    replace: "FREESANS_12PT_WIN1251"

  - type: replace
    description: "Replace medium font encoding"
    search: "FREESANS_9PT_WIN1252"
    replace: "FREESANS_9PT_WIN1251"

  - type: replace
    description: "Replace small font encoding"
    search: "FREESANS_6PT_WIN1252"
    replace: "FREESANS_6PT_WIN1251"
